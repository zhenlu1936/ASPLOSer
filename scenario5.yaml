base: default
name: model2-s5-disaster-recovery-bootstrap

doc_metadata:
  title: "Scenario 5: Disaster Recovery Bootstrap"
  composition_note: "This scenario models post-incident bootstrap behavior where initialize-phase trust on edges is globally reduced until re-attestation."
  overview: "Scenario 5 applies broad non-high initialize-edge defaults and introduces a targeted deployment discontinuity to represent recovery-mode risk posture."

# Real-world profile:
# Post-incident bootstrap where initialize-phase trust is globally reduced
# until the environment is re-attested.

initialize_edge_default_attributes:
  confidentiality: NonConfidential
  correctness: MixedCorrectness
  continuity: MixedContinuity

initialize_edge_overrides:
  - source: ModelAppAndDepI
    target: InferenceModule
    name: D2.Delopy
    attributes:
      continuity: Discontinuous
