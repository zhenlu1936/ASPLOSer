base: default
name: model2-s2-enterprise-cloud

# Model 2.0-oriented profile for public/mixed channels.

node_overrides:
  - name: PreprocessingModule
    attributes:
      credibility: Trusted
  - name: PostprocessingModule
    attributes:
      credibility: Trusted
  - name: User
    attributes:
      credibility: Trusted
  - name: Maintainer
    attributes:
      continuity: MixedContinuity
  - name: OperatingEnvironment
    attributes:
      credibility: Trusted
      correctness: MixedCorrectness
      continuity: MixedContinuity
  - name: ModelHub
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - name: AppHub
    attributes:
      confidentiality: NonConfidential
  - name: DependencyHub
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness

edge_overrides:
  - source: ModelHub
    target: Maintainer
    name: 4.Download
    type: ActedOnBy
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - source: DependencyHub
    target: Maintainer
    name: 8.Download
    type: ActedOnBy
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - source: Maintainer
    target: IntelligentSystem
    name: 9.Assemble
    type: Act
    attributes:
      continuity: MixedContinuity