base: default
name: model2-s2-hybrid-public-supply-chain

doc_metadata:
  title: "Scenario 2: Hybrid Public Supply Chain"
  composition_note: "This scenario captures an enterprise assistant that consumes model, app, and dependency artifacts from mixed-trust public registries."
  overview: "Scenario 2 models a mixed-trust release path where external artifacts can lower confidentiality, correctness, and continuity along the deployment chain."

# Real-world profile:
# An enterprise service that pulls model/app/dependency artifacts from mixed-trust public registries.

node_overrides:
  - name: PreprocessingModule
    attributes:
      credibility: Trusted
  - name: PostprocessingModule
    attributes:
      credibility: Trusted
  - name: Users
    attributes:
      credibility: Trusted
  - name: Maintainers
    attributes:
      continuity: MixedContinuity
  - name: OutsideEnv
    attributes:
      credibility: Trusted
      correctness: MixedCorrectness
      continuity: MixedContinuity
  - name: ModelUploadedO
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - name: AppUploadedO
    attributes:
      confidentiality: NonConfidential
  - name: DependenciesUploadedO
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness

initialize_edge_overrides:
  - source: ModelDownloadedI
    target: Maintainers
    name: M6.Download
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - source: DependenciesDownloadedI
    target: Maintainers
    name: P2.Download
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - source: ModelAppAndDepI
    target: InferenceModule
    name: D2.Delopy
    attributes:
      continuity: MixedContinuity