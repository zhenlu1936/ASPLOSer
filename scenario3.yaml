base: default
name: model2-s3-adversarial-propagation

# Model 2.0 adversarial profile. Keeps compatibility schema while encoding
# one-arc-type conceptual behavior via edge attributes.

node_overrides:
  - name: DataWorker
    attributes:
      credibility: Untrusted
      correctness: MixedCorrectness
      continuity: MixedContinuity
  - name: AppDeveloper
    attributes:
      credibility: Untrusted
      correctness: MixedCorrectness
      continuity: MixedContinuity
  - name: Maintainer
    attributes:
      credibility: Untrusted
      correctness: MixedCorrectness
      continuity: Discontinuous
  - name: OperatingEnvironment
    attributes:
      credibility: MixedCredibility
      correctness: MixedCorrectness
      continuity: MixedContinuity
  - name: ModelHub
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - name: AppHub
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
  - name: DependencyHub
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
      continuity: MixedContinuity

edge_overrides:
  - source: DataWorker
    target: ProcessedData
    name: 1.Process
    type: Act
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
      continuity: MixedContinuity
  - source: ModelHub
    target: Maintainer
    name: 4.Download
    type: ActedOnBy
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
      continuity: Discontinuous
  - source: Maintainer
    target: Dependency
    name: 8.Download
    type: Act
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
      continuity: Discontinuous
  - source: Maintainer
    target: IntelligentSystem
    name: 9.Assemble
    type: Act
    attributes:
      correctness: MixedCorrectness
      continuity: Discontinuous
  - source: OutputMaterialized
    target: User
    name: R1.Respond
    type: Respond
    attributes:
      confidentiality: NonConfidential
      correctness: MixedCorrectness
      continuity: Discontinuous