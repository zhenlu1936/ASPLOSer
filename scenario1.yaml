base: default
name: model2-s1-private-pipeline

# Model 2.0 rewrite note:
# - round nodes: subjects
# - rectangular nodes: actions
# - arcs: objects (single arc type in conceptual model)
# Runtime remains backward-compatible with override schema.

node_overrides:
  - name: PreprocessingModule
    attributes:
      credibility: Trusted
  - name: InferenceModule
    attributes:
      credibility: Trusted
  - name: PostprocessingModule
    attributes:
      credibility: Trusted
  - name: User
    attributes:
      credibility: Trusted
  - name: Maintainer
    attributes:
      credibility: Trusted
  - name: DataWorker
    attributes:
      credibility: Trusted
  - name: OperatingEnvironment
    attributes:
      credibility: Trusted
      continuity: MixedContinuity

edge_overrides:
  - source: Maintainer
    target: IntelligentSystem
    name: 9.Assemble
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: User
    target: InputQuery
    name: 10.Propose
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: OutputMaterialized
    target: User
    name: R1.Respond
    type: Respond
    attributes:
      continuity: MixedContinuity