base: default
name: Private mobile single-user pipeline

# This scenario only stores differences from the default framework system.
node_overrides:
  - name: PreprocessingModule
    attributes:
      credibility: Trusted
  - name: InferenceModule
    attributes:
      credibility: Trusted
  - name: PostprocessingModule
    attributes:
      credibility: Trusted
  - name: User
    attributes:
      credibility: Trusted
  - name: Maintainer
    attributes:
      credibility: Trusted
  - name: DataWorker
    attributes:
      credibility: Trusted
  - name: OperatingEnvironment
    attributes:
      credibility: Trusted
      continuity: MixedContinuity

  - name: ModelHub
    attributes:
      confidentiality: Confidential
  - name: AppHub
    attributes:
      confidentiality: Confidential
  - name: DependencyHub
    attributes:
      confidentiality: Confidential
  - name: ModelPretrained
    attributes:
      confidentiality: Confidential
  - name: ApplicationProgrammed
    attributes:
      confidentiality: Confidential
  - name: Application
    attributes:
      confidentiality: Confidential
  - name: Dependency
    attributes:
      confidentiality: Confidential
  - name: InputQuery
    attributes:
      continuity: MixedContinuity
  - name: InputToken
    attributes:
      continuity: MixedContinuity
  - name: OutputToken
    attributes:
      confidentiality: Confidential
      continuity: MixedContinuity
  - name: OutputMaterialized
    attributes:
      confidentiality: Confidential
      continuity: MixedContinuity

edge_overrides:
  - source: Maintainer
    target: IntelligentSystem
    name: 9.Assemble
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: User
    target: InputQuery
    name: 10.Propose
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: InputQuery
    target: PreprocessingModule
    name: 11.Pre-Process
    type: ActedOnBy
    attributes:
      continuity: MixedContinuity
  - source: PreprocessingModule
    target: InputToken
    name: 11.Pre-Process
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: InputToken
    target: InferenceModule
    name: 12.Inference
    type: ActedOnBy
    attributes:
      continuity: MixedContinuity
  - source: InferenceModule
    target: OutputToken
    name: 12.Inference
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: OutputToken
    target: PostprocessingModule
    name: 13.Post-Process
    type: ActedOnBy
    attributes:
      continuity: MixedContinuity
  - source: PostprocessingModule
    target: OutputMaterialized
    name: 13.Post-Process
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: IntelligentSystem
    target: OperatingEnvironment
    name: ComponentOf
    type: ComponentOf
    attributes:
      continuity: MixedContinuity
  - source: OutputMaterialized
    target: User
    name: R1.Respond
    type: Respond
    attributes:
      continuity: MixedContinuity
  - source: OutputMaterialized
    target: OperatingEnvironment
    name: R2.Respond
    type: Respond
    attributes:
      continuity: MixedContinuity
  - source: OperatingEnvironment
    target: IntelligentSystem
    name: R3.Respond
    type: Respond
    attributes:
      continuity: MixedContinuity
