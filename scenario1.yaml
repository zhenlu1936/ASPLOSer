base: default
name: model2-s1-regulated-private-assistant

doc_metadata:
  title: "Scenario 1: Regulated Private Assistant"
  composition_note: "This scenario represents a regulated enterprise assistant deployed in a private environment with trusted operators and controlled releases."
  overview: "Scenario 1 models a conservative production baseline where confidentiality and correctness are generally high, while runtime continuity may occasionally degrade due to network and service dependencies."

# Real-world profile:
# A regulated enterprise assistant running in a private environment.
# Most operators are trusted, but end-to-end interaction continuity is not perfect.

node_overrides:
  - name: PreprocessingModule
    attributes:
      credibility: Trusted
  - name: InferenceModule
    attributes:
      credibility: Trusted
  - name: PostprocessingModule
    attributes:
      credibility: Trusted
  - name: Users
    attributes:
      credibility: Trusted
  - name: Maintainers
    attributes:
      credibility: Trusted
  - name: DataWorkers
    attributes:
      credibility: Trusted
  - name: OutsideEnv
    attributes:
      credibility: Trusted
      continuity: MixedContinuity

initialize_edge_overrides:
  - source: ModelAppAndDepI
    target: InferenceModule
    name: D2.Delopy
    attributes:
      continuity: MixedContinuity
  - source: Users
    target: InputO
    name: O1.Input
    attributes:
      continuity: MixedContinuity
  - source: OutputI
    target: Users
    name: O4.Postprocess
    attributes:
      continuity: MixedContinuity