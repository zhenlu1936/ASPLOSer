doc_metadata:
  title: "Scenario 2: Inexperienced Users And Insecure Community"
  composition_note: "This scenario models an assistant exposed to inexperienced users and loosely governed community contributions with weak security hygiene."
  overview: "Scenario 2 emphasizes reduced trust, weaker artifact assurance, and discontinuous operations that can amplify confidentiality, correctness, and availability risks."

# Real-world profile:
# Inexperienced users interact with a system sustained by an insecure community supply chain.
# Contributor trust and operational continuity are degraded compared with controlled enterprise settings.

