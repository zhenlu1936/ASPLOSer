doc_metadata:
  title: "Scenario 4: Foundation Model Release Pipeline Compromise"
  composition_note: "This scenario models an AI release-pipeline compromise in which trusted model, application, and dependency distribution channels publish tainted artifacts that appear legitimate to downstream deployment teams."
  overview: "Scenario 4 focuses on AI release-pipeline trust collapse: model and application artifacts look authentic but carry downgraded confidentiality, correctness, and continuity that propagate into deployed inference services."

# AI incident profile:
# A trusted model/application release channel is compromised and distributes tainted AI artifacts.
# Downstream teams consume apparently legitimate model and app packages that are actually high risk.

