base: default
name: model2-s4-solarwinds-orion-supply-chain-compromise

doc_metadata:
  title: "Scenario 4: SolarWinds Orion Supply-Chain Compromise"
  composition_note: "This scenario is inspired by the 2020 SolarWinds Orion incident, where trusted software release channels were abused to deliver tainted updates."
  overview: "Scenario 4 focuses on release-pipeline trust collapse: artifacts and deployment pathways appear legitimate but carry downgraded confidentiality, correctness, and continuity that propagate across stages."

# Real-world profile:
# A trusted enterprise release channel is compromised and distributes tainted updates.
# The system consumes apparently legitimate artifacts that are actually high risk.

