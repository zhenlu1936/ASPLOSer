base: default
name: model2-s4-emergency-offline-rollout

doc_metadata:
  title: "Scenario 4: Emergency Offline Rollout"
  composition_note: "This scenario models an emergency packaged rollout where selected upload and feedback loops are intentionally suspended."
  overview: "Scenario 4 focuses on continuity under constrained operations, with reduced interaction pathways and selective deployment-edge continuity degradation."

# Real-world profile:
# Emergency packaged rollout where normal upload and feedback loops are intentionally suspended.

edge_pair_omissions:
  - name: A2.Upload
  - name: F1.Feedback
    source: Users
    target: OutputFeedbackO
  - name: F1.Feedback
    source: FeedbackI
    target: ModelDevelopers
  - name: F1.Feedback
    source: FeedbackI
    target: AppDevelopers
  - name: F1.Feedback
    source: FeedbackI
    target: DependencyDevelopers
  - name: F1.Feedback
    source: FeedbackI
    target: Maintainers

node_overrides:
  - name: Users
    attributes:
      credibility: Trusted
  - name: Maintainers
    attributes:
      credibility: Trusted
  - name: OutsideEnv
    attributes:
      credibility: Trusted
      continuity: MixedContinuity

initialize_edge_overrides:
  - source: ModelAppAndDepI
    target: InferenceModule
    name: D2.Delopy
    attributes:
      continuity: MixedContinuity
  - source: OutputMaterializedI
    target: OutsideEnv
    name: O4.Postprocess
    attributes:
      continuity: MixedContinuity
  - source: OutsideEnv
    target: InputMaterializedO
    name: O1.Input
    attributes:
      continuity: MixedContinuity