base: default
name: model2-s4-static-packaged

# Static packaged deployment: reduced feedback and omitted upload pair.

edge_pair_omissions:
  - name: 6.Upload
  - name: R4.Respond
    types: ["Respond"]
  - name: R5.Respond
    types: ["Respond"]
  - name: R6.Respond
    types: ["Respond"]
  - name: R7.Respond
    types: ["Respond"]

node_overrides:
  - name: User
    attributes:
      credibility: Trusted
  - name: Maintainer
    attributes:
      credibility: Trusted
  - name: OperatingEnvironment
    attributes:
      credibility: Trusted
      continuity: MixedContinuity

edge_overrides:
  - source: Maintainer
    target: IntelligentSystem
    name: 9.Assemble
    type: Act
    attributes:
      continuity: MixedContinuity
  - source: OutputMaterialized
    target: OperatingEnvironment
    name: R2.Respond
    type: Respond
    attributes:
      continuity: MixedContinuity
  - source: OperatingEnvironment
    target: IntelligentSystem
    name: R3.Respond
    type: Respond
    attributes:
      continuity: MixedContinuity